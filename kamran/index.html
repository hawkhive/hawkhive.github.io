<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Milk Billing App</title>
  <style>
    :root {
      --primary: #2e7d32;
      --bg: #f5f5f5;
      --card: #fff;
      --text: #333;
      --border: #ddd;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: 60px; /* space for nav */
    }
    #content { flex: 1; overflow-y: auto; padding: 16px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    /* Bottom navigation */
    #nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--card); display: flex; justify-content: space-around;
      box-shadow: 0 -2px 6px rgba(0,0,0,0.1); height: 55px; align-items: center; z-index: 10;
    }
    .nav-btn {
      background: none; border: none; font-size: 14px; cursor: pointer;
      padding: 8px 12px; color: #666; flex: 1; text-align: center;
    }
    .nav-btn.active { color: var(--primary); font-weight: 600; }
    /* Cards for clients */
    .client-card {
      background: var(--card); border-radius: 10px;
      padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
    }
    .client-info { flex: 1; }
    .client-name { font-weight: 600; }
    .client-detail { font-size: 13px; color: #666; margin-top: 4px; }
    .client-actions { display: flex; gap: 8px; }
    .btn {
      padding: 8px 14px; border: none; border-radius: 6px;
      background: var(--primary); color: white; font-size: 13px; cursor: pointer;
    }
    .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
    .btn-danger { background: #c62828; }
    .btn-sm { padding: 6px 10px; font-size: 12px; }
    /* Monthly grid scrollable */
    .grid-wrapper {
      overflow-x: auto; margin-top: 10px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--card);
    }
    table.monthly-grid {
      border-collapse: collapse; width: max-content;
    }
    table.monthly-grid th, table.monthly-grid td {
      padding: 6px 4px; text-align: center; font-size: 12px;
      border: 1px solid #eee; min-width: 32px;
    }
    table.monthly-grid th { background: #f0f0f0; position: sticky; top: 0; }
    table.monthly-grid td.client-name { text-align: left; font-weight: 500; background: #fafafa; position: sticky; left: 0; }
    .cell-default { background: #e8f5e9; }
    .cell-override { background: #fff3e0; font-weight: 600; }
    .cell-clickable { cursor: pointer; }
    /* Modals */
    .modal {
      display: none; position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index:100;
    }
    .modal-content {
      background: white; padding: 20px; border-radius: 12px;
      width: 90%; max-width: 300px; text-align: center;
    }
    .modal input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid var(--border); border-radius: 6px; font-size: 16px; }
    .modal-actions { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
    /* Dropdowns for month/year */
    .month-select-group {
      display: flex; gap: 8px; margin-bottom: 10px;
    }
    .month-select-group select {
      flex: 1; padding: 10px; border-radius: 6px; border: 1px solid var(--border);
      font-size: 16px; background: white;
    }
    /* Print styles handled in print window */
  </style>
</head>
<body>
  <div id="content">
    <!-- Clients Tab -->
    <div id="tab-clients" class="tab-content active">
      <h2>Clients</h2>
      <div id="clients-list"></div>
      <button class="btn" style="margin-top:10px; width:100%;" onclick="showAddClientModal()">+ Add Client</button>
    </div>
    <!-- Monthly View Tab -->
    <div id="tab-monthly" class="tab-content">
      <h2>Monthly View</h2>
      <div class="month-select-group">
        <select id="monthSelect"></select>
        <select id="yearSelect"></select>
      </div>
      <div class="grid-wrapper" id="monthlyGridContainer"></div>
    </div>
    <!-- Print Tab -->
    <div id="tab-print" class="tab-content">
      <h2>Print Receipts</h2>
      <div class="month-select-group">
        <select id="printMonthSelect"></select>
        <select id="printYearSelect"></select>
      </div>
      <button class="btn" style="width:100%; margin-top:10px;" onclick="printAllReceipts()">Generate & Print All Receipts</button>
    </div>
  </div>

  <nav id="nav">
    <button class="nav-btn active" data-tab="tab-clients">Clients</button>
    <button class="nav-btn" data-tab="tab-monthly">Monthly</button>
    <button class="nav-btn" data-tab="tab-print">Print</button>
  </nav>

  <!-- Client Add/Edit Modal -->
  <div id="clientModal" class="modal">
    <div class="modal-content">
      <h3 id="modalTitle">Add Client</h3>
      <input type="hidden" id="editClientId">
      <input type="text" id="clientName" placeholder="Name">
      <input type="number" id="clientLiters" placeholder="Daily Liters" step="0.5">
      <input type="number" id="clientPrice" placeholder="Price per Liter" step="0.01">
      <div class="modal-actions">
        <button class="btn" onclick="saveClient()">Save</button>
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Delivery Override Modal -->
  <div id="deliveryModal" class="modal">
    <div class="modal-content">
      <h3>Set Delivery</h3>
      <p id="deliveryInfo"></p>
      <input type="number" id="deliveryLiters" placeholder="Liters" step="0.5">
      <div class="modal-actions">
        <button class="btn" onclick="saveDelivery()">Set Override</button>
        <button class="btn btn-danger" onclick="resetDelivery()">Reset to Default</button>
        <button class="btn btn-outline" onclick="closeDeliveryModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    // ===================== CONFIGURATION =====================
    const API_URL = 'https://script.google.com/macros/s/AKfycbwfGvOmbEwOuSnO_70UpLlZByaB8zmQDo-AIuCyn_WuYdeZUFj9_T98zOsBBOgHW1TcvA/exec';
    const API_KEY = 'KamranDairy';
    // =========================================================
    let clients = [];
    let currentMonthDeliveries = {};
    let selectedClientForDelivery = null;
    let selectedDateForDelivery = null;

    // ------------------ API calls ------------------
    async function apiCall(params) {
      const url = new URL(API_URL);
      url.searchParams.set('apiKey', API_KEY);
      for (const [key, val] of Object.entries(params)) {
        url.searchParams.set(key, val);
      }
      try {
        const res = await fetch(url);
        return await res.json();
      } catch (err) {
        alert('Network error: ' + err.message);
        return { error: err.message };
      }
    }

    // ------------------ Navigation ------------------
    function switchTab(tabId) {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      document.querySelector(`.nav-btn[data-tab="${tabId}"]`).classList.add('active');
      if (tabId === 'tab-monthly') {
        initMonthlyDropdowns();
        loadMonthlyView();
      }
      if (tabId === 'tab-print') initPrintDropdowns();
      if (tabId === 'tab-clients') loadClients();
    }

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    // ------------------ Month/Year Dropdowns ------------------
    function populateMonthYear(monthSelectId, yearSelectId, onChangeCallback) {
      const monthSelect = document.getElementById(monthSelectId);
      const yearSelect = document.getElementById(yearSelectId);
      const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      monthSelect.innerHTML = months.map((name, idx) => `<option value="${idx+1}">${name}</option>`).join('');
      const currentYear = new Date().getFullYear();
      for (let y = currentYear - 5; y <= currentYear + 5; y++) {
        yearSelect.innerHTML += `<option value="${y}">${y}</option>`;
      }
      // Set defaults to current month/year
      monthSelect.value = new Date().getMonth() + 1;
      yearSelect.value = currentYear;
      // Attach change handler
      monthSelect.addEventListener('change', onChangeCallback);
      yearSelect.addEventListener('change', onChangeCallback);
    }

    function getMonthYearString(monthSelectId, yearSelectId) {
      const month = document.getElementById(monthSelectId).value;
      const year = document.getElementById(yearSelectId).value;
      return `${year}-${String(month).padStart(2,'0')}`;
    }

    // Monthly tab
    function initMonthlyDropdowns() {
      populateMonthYear('monthSelect', 'yearSelect', loadMonthlyView);
    }

    // Print tab
    function initPrintDropdowns() {
      populateMonthYear('printMonthSelect', 'printYearSelect', () => {}); // no auto load
    }

    // Initial population on page load
    initMonthlyDropdowns();
    initPrintDropdowns();

    // ------------------ Clients Management ------------------
    async function loadClients() {
      const result = await apiCall({ action: 'getClients' });
      if (Array.isArray(result)) {
        clients = result;
      } else {
        clients = [];
      }
      renderClients();
    }

    function renderClients() {
      const container = document.getElementById('clients-list');
      if (clients.length === 0) {
        container.innerHTML = '<p>No clients yet.</p>';
        return;
      }
      container.innerHTML = clients.map(c => `
        <div class="client-card">
          <div class="client-info">
            <div class="client-name">${escapeHtml(c.name)}</div>
            <div class="client-detail">Default: ${c.defaultLiters} L | Price: ₹${c.price}</div>
          </div>
          <div class="client-actions">
            <button class="btn-outline btn-sm" onclick="editClient('${c.clientId}')">Edit</button>
            <button class="btn-danger btn-sm" onclick="deleteClient('${c.clientId}')">Del</button>
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    function showAddClientModal() {
      document.getElementById('modalTitle').innerText = 'Add Client';
      document.getElementById('editClientId').value = '';
      document.getElementById('clientName').value = '';
      document.getElementById('clientLiters').value = '';
      document.getElementById('clientPrice').value = '';
      document.getElementById('clientModal').style.display = 'flex';
    }

    function editClient(clientId) {
      const client = clients.find(c => c.clientId === clientId);
      if (!client) return;
      document.getElementById('modalTitle').innerText = 'Edit Client';
      document.getElementById('editClientId').value = clientId;
      document.getElementById('clientName').value = client.name;
      document.getElementById('clientLiters').value = client.defaultLiters;
      document.getElementById('clientPrice').value = client.price;
      document.getElementById('clientModal').style.display = 'flex';
    }

    async function deleteClient(clientId) {
      if (!confirm('Delete this client and all their delivery records?')) return;
      await apiCall({ action: 'deleteClient', clientId });
      loadClients();
    }

    async function saveClient() {
      const id = document.getElementById('editClientId').value;
      const name = document.getElementById('clientName').value.trim();
      const liters = document.getElementById('clientLiters').value;
      const price = document.getElementById('clientPrice').value;
      if (!name) { alert('Name required'); return; }
      if (id) {
        await apiCall({ action: 'updateClient', clientId: id, name, defaultLiters: liters, price });
      } else {
        await apiCall({ action: 'addClient', name, defaultLiters: liters, price });
      }
      closeModal();
      loadClients();
    }

    function closeModal() {
      document.getElementById('clientModal').style.display = 'none';
    }

    // ------------------ Monthly Grid ------------------
    async function loadMonthlyView() {
      const monthVal = getMonthYearString('monthSelect', 'yearSelect');
      if (!monthVal) return;
      const clientsResult = await apiCall({ action: 'getClients' });
      if (Array.isArray(clientsResult)) clients = clientsResult;
      currentMonthDeliveries = await apiCall({ action: 'getDeliveries', yearMonth: monthVal });
      if (currentMonthDeliveries.error) {
        currentMonthDeliveries = {};
        alert('Error loading deliveries: ' + currentMonthDeliveries.error);
      }
      renderMonthlyGrid(monthVal);
    }

    function renderMonthlyGrid(monthVal) {
      const container = document.getElementById('monthlyGridContainer');
      const [year, month] = monthVal.split('-').map(Number);
      const daysInMonth = new Date(year, month, 0).getDate(); // month input gives 1-indexed month

      let html = `<table class="monthly-grid"><thead><tr><th>Client</th>`;
      for (let d = 1; d <= daysInMonth; d++) html += `<th>${d}</th>`;
      html += `<th>Total L</th></tr></thead><tbody>`;

      clients.forEach(client => {
        html += `<tr><td class="client-name">${escapeHtml(client.name)}</td>`;
        let total = 0;
        for (let d = 1; d <= daysInMonth; d++) {
          const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const override = currentMonthDeliveries?.[client.clientId]?.[dateStr];
          const liters = (override !== undefined) ? override : client.defaultLiters;
          total += liters;
          const cellClass = (override !== undefined) ? 'cell-override' : 'cell-default';
          html += `<td class="${cellClass} cell-clickable" data-clientid="${client.clientId}" data-date="${dateStr}" data-liters="${liters}">${liters}</td>`;
        }
        html += `<td style="font-weight:bold;">${total}</td></tr>`;
      });
      html += '</tbody></table>';
      container.innerHTML = html;

      // Attach click events to delivery cells
      container.querySelectorAll('.cell-clickable').forEach(cell => {
        cell.addEventListener('click', () => {
          selectedClientForDelivery = cell.dataset.clientid;
          selectedDateForDelivery = cell.dataset.date;
          const clientRow = cell.closest('tr');
          const clientNameCell = clientRow ? clientRow.querySelector('.client-name') : null;
          document.getElementById('deliveryInfo').innerText = `Client: ${clientNameCell ? clientNameCell.innerText : ''} - ${cell.dataset.date}`;
          document.getElementById('deliveryLiters').value = cell.dataset.liters;
          document.getElementById('deliveryModal').style.display = 'flex';
        });
      });
    }

    async function saveDelivery() {
      const liters = document.getElementById('deliveryLiters').value;
      if (liters === '' || isNaN(liters)) { alert('Enter a valid number'); return; }
      await apiCall({
        action: 'setDelivery',
        clientId: selectedClientForDelivery,
        date: selectedDateForDelivery,
        liters: parseFloat(liters)
      });
      closeDeliveryModal();
      loadMonthlyView();
    }

    async function resetDelivery() {
      if (!confirm('Reset to default litres?')) return;
      await apiCall({
        action: 'setDelivery',
        clientId: selectedClientForDelivery,
        date: selectedDateForDelivery,
        liters: null
      });
      closeDeliveryModal();
      loadMonthlyView();
    }

    function closeDeliveryModal() {
      document.getElementById('deliveryModal').style.display = 'none';
    }

    // ------------------ Print Receipts (4 per A4 page) ------------------
    async function printAllReceipts() {
      const monthVal = getMonthYearString('printMonthSelect', 'printYearSelect');
      if (!monthVal) { alert('Select a month first'); return; }
      const [year, month] = monthVal.split('-').map(Number);
      const daysInMonth = new Date(year, month, 0).getDate();
      const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      const monthName = monthNames[month-1];

      // Fetch fresh data
      const clientsResult = await apiCall({ action: 'getClients' });
      if (!Array.isArray(clientsResult)) {
        alert('Failed to load clients');
        return;
      }
      clients = clientsResult;
      const deliveries = await apiCall({ action: 'getDeliveries', yearMonth: monthVal });
      if (deliveries.error) {
        alert('Error loading deliveries: ' + deliveries.error);
        return;
      }

      // Generate receipt HTML for each client
      const receiptDivs = [];
      clients.forEach(client => {
        let receiptHTML = `<div class="receipt">`;
        receiptHTML += `<div class="header"><strong>${escapeHtml(client.name)}</strong><br>${monthName} ${year}<br>Rate: ₹${client.price} / Litre</div>`;
        receiptHTML += `<table><thead><tr><th>Day</th><th>Litre</th><th>Day</th><th>Litre</th></tr></thead><tbody>`;
        let totalLiters = 0;
        for (let d = 1; d <= 16; d++) {
          const leftDay = d;
          const rightDay = d + 16;
          const leftDate = `${year}-${String(month).padStart(2,'0')}-${String(leftDay).padStart(2,'0')}`;
          const leftOverride = deliveries?.[client.clientId]?.[leftDate];
          const leftLiters = (leftOverride !== undefined) ? leftOverride : client.defaultLiters;
          totalLiters += leftLiters;

          let rightLitersStr = '';
          let rightDayStr = '';
          if (rightDay <= daysInMonth) {
            const rightDate = `${year}-${String(month).padStart(2,'0')}-${String(rightDay).padStart(2,'0')}`;
            const rightOverride = deliveries?.[client.clientId]?.[rightDate];
            const rightLiters = (rightOverride !== undefined) ? rightOverride : client.defaultLiters;
            totalLiters += rightLiters;
            rightDayStr = rightDay;
            rightLitersStr = rightLiters;
          }
          receiptHTML += `<tr><td>${leftDay}</td><td>${leftLiters}</td><td>${rightDayStr}</td><td>${rightLitersStr}</td></tr>`;
        }
        receiptHTML += `</tbody></table>`;
        receiptHTML += `<div class="total">Total Litre: ${totalLiters} | Total ₹${totalLiters * client.price}</div>`;
        receiptHTML += `</div>`;
        receiptDivs.push(receiptHTML);
      });

      // Create print window
      const printWindow = window.open('', '_blank', 'width=800,height=600');
      if (!printWindow) {
        alert('Please allow pop-ups for this site to print receipts.');
        return;
      }
      printWindow.document.write(`
        <html>
        <head>
          <title>Print Receipts</title>
          <style>
            @page { size: A4; margin: 0.5cm; }
            body { margin: 0; padding: 0; font-family: system-ui; }
            .receipt-grid {
              display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
              width: 100%; height: 100vh; page-break-after: always;
            }
            .receipt {
              border: 1px solid #000; padding: 0.3cm; margin: 0.1cm;
              display: flex; flex-direction: column; justify-content: flex-start;
              font-size: 12px; line-height: 1.3;
            }
            .receipt table { width: 100%; border-collapse: collapse; margin-top: 5px; }
            .receipt th, .receipt td { padding: 2px 4px; text-align: center; }
            .receipt .header { text-align: center; margin-bottom: 5px; }
            .receipt .total { margin-top: 5px; font-weight: bold; }
          </style>
        </head>
        <body>
      `);

      for (let i = 0; i < receiptDivs.length; i += 4) {
        const chunk = receiptDivs.slice(i, i + 4);
        while (chunk.length < 4) chunk.push('<div class="receipt"></div>');
        printWindow.document.write('<div class="receipt-grid">');
        chunk.forEach(r => printWindow.document.write(r));
        printWindow.document.write('</div>');
      }
      printWindow.document.write('');
      printWindow.document.close();
      printWindow.focus();
      setTimeout(() => {
        printWindow.print();
      }, 800);
    }

    // Initial load
    loadClients();
  </script>
</body>
</html>
